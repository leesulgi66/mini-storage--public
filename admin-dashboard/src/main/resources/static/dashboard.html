<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드 - mini-storage admin</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="/js/auth.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #f5f5f3; display: flex; min-height: 100vh; }

        /* 사이드바 */
        .sidebar { width: 220px; background: #fff; border-right: 1px solid #e8e8e6; padding: 1.5rem 1rem; flex-shrink: 0; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; }
        .sidebar-logo { display: flex; align-items: center; gap: 8px; padding: 0 0.5rem; margin-bottom: 2rem; }
        .logo-icon { width: 30px; height: 30px; background: #111; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .logo-icon svg { width: 15px; height: 15px; }
        .logo-text { font-size: 14px; font-weight: 500; color: #111; letter-spacing: -0.3px; }
        .logo-sub { font-size: 11px; color: #999; }
        .nav-label { font-size: 11px; color: #bbb; letter-spacing: 0.5px; text-transform: uppercase; padding: 0 0.5rem; margin-bottom: 0.5rem; }
        .nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 7px; font-size: 14px; color: #555; cursor: pointer; margin-bottom: 2px; text-decoration: none; }
        .nav-item:hover { background: #f5f5f3; }
        .nav-item.active { background: #111; color: #fff; }
        .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
        .nav-spacer { flex: 1; }
        .nav-user { display: flex; align-items: center; gap: 8px; padding: 8px 10px; }
        .avatar { width: 28px; height: 28px; background: #e8e8e6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: #555; flex-shrink: 0; }
        .user-name { font-size: 13px; font-weight: 500; color: #111; }
        .user-role { font-size: 11px; color: #999; }
        .logout-btn { width: 100%; margin-top: 0.5rem; padding: 8px 10px; font-size: 13px; color: #999; background: none; border: none; cursor: pointer; text-align: left; font-family: inherit; border-radius: 7px; }
        .logout-btn:hover { background: #f5f5f3; color: #555; }

        /* 메인 */
        .main { margin-left: 220px; flex: 1; padding: 2rem; }
        .page-header { margin-bottom: 1.75rem; }
        .page-header h1 { font-size: 20px; font-weight: 500; color: #111; letter-spacing: -0.4px; }
        .page-header p { font-size: 13px; color: #999; margin-top: 3px; }

        /* 통계 카드 */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.75rem; }
        .stat-card { background: #fff; border: 1px solid #e8e8e6; border-radius: 10px; padding: 1.1rem 1.25rem; }
        .stat-label { font-size: 12px; color: #999; margin-bottom: 0.5rem; }
        .stat-value { font-size: 24px; font-weight: 500; color: #111; letter-spacing: -0.5px; }
        .stat-sub { font-size: 12px; color: #bbb; margin-top: 4px; }

        /* 이미지 섹션 */
        .section { background: #fff; border: 1px solid #e8e8e6; border-radius: 10px; padding: 1.25rem; margin-bottom: 1.25rem; }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
        .section-title { font-size: 14px; font-weight: 500; color: #111; }
        .btn-sm { font-size: 13px; padding: 6px 14px; border: 1px solid #e0e0de; border-radius: 7px; background: #fff; color: #555; cursor: pointer; font-family: inherit; text-decoration: none; }
        .btn-sm:hover { background: #f5f5f3; }
        .image-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .image-card { border: 1px solid #e8e8e6; border-radius: 8px; overflow: hidden; cursor: pointer; }
        .image-card:hover { border-color: #bbb; }
        .image-thumb { height: 100px; background: #f0f0ee; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .image-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .image-thumb svg { width: 24px; height: 24px; }
        .image-info { padding: 8px 10px; }
        .image-name { font-size: 12px; color: #333; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .image-size { font-size: 11px; color: #bbb; margin-top: 2px; }
        .badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 4px; background: #f0f0ee; color: #888; margin-top: 4px; }

        /* 버킷 섹션 */
        .bucket-list { display: flex; flex-direction: column; gap: 8px; }
        .bucket-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border: 1px solid #e8e8e6; border-radius: 8px; }
        .bucket-name { font-size: 14px; font-weight: 500; color: #111; }
        .bucket-count { font-size: 13px; color: #999; }

        /* 로딩/에러 */
        .loading { text-align: center; padding: 3rem; color: #bbb; font-size: 14px; }
        .empty { text-align: center; padding: 3rem; color: #bbb; font-size: 14px; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon">
            <svg viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="6" rx="1.5" fill="white"/><rect x="10" y="2" width="6" height="6" rx="1.5" fill="white" opacity="0.5"/><rect x="2" y="10" width="6" height="6" rx="1.5" fill="white" opacity="0.5"/><rect x="10" y="10" width="6" height="6" rx="1.5" fill="white" opacity="0.3"/></svg>
        </div>
        <div>
            <div class="logo-text">mini-storage</div>
            <div class="logo-sub">admin console</div>
        </div>
    </div>
    <div class="nav-label">메뉴</div>
    <a href="/dashboard.html" class="nav-item active">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
        대시보드
    </a>
    <a href="/logs.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h12M2 12h8"/></svg>
        접속 로그
    </a>
    <a href="/images.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="10" rx="1.5"/><circle cx="5.5" cy="7.5" r="1.5"/><path d="M15 11l-4-4-6 6"/></svg>
        이미지 관리
    </a>
    <a href="/upload.html" class="nav-item">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 11V3M5 6l3-3 3 3"/><path d="M2 13h12"/></svg>
        업로드
    </a>
    <div class="nav-spacer"></div>
    <div class="nav-user">
        <div class="avatar" id="user-avatar">AD</div>
        <div>
            <div class="user-name" id="user-name">-</div>
            <div class="user-role">관리자</div>
        </div>
    </div>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
</div>

<div class="main">
    <div class="page-header">
        <h1>대시보드</h1>
        <p>전체 현황을 확인하세요</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">총 이미지</div><div class="stat-value" id="stat-images">-</div><div class="stat-sub">image-service</div></div>
        <div class="stat-card"><div class="stat-label">총 오브젝트</div><div class="stat-value" id="stat-objects">-</div><div class="stat-sub">썸네일 포함</div></div>
        <div class="stat-card"><div class="stat-label">버킷 수</div><div class="stat-value" id="stat-buckets">-</div><div class="stat-sub">mini-s3</div></div>
        <div class="stat-card"><div class="stat-label">총 용량</div><div class="stat-value" id="stat-size">-</div><div class="stat-sub">저장 중</div></div>
    </div>

    <div class="section">
        <div class="section-header">
            <span class="section-title">버킷 현황</span>
        </div>
        <div class="bucket-list" id="bucket-list">
            <div class="loading">불러오는 중...</div>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            <span class="section-title">최근 이미지</span>
            <a href="/images.html" class="btn-sm">전체 보기</a>
        </div>
        <div class="image-grid" id="image-grid">
            <div class="loading" style="grid-column: 1/-1">불러오는 중...</div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('accessToken');
    const role = localStorage.getItem('role');
    if (!token) location.href = '/index.html';

    function formatBytes(bytes) {
        if (!bytes) return '0 B';
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
    }

    async function loadDashboard() {
        try {
            const res = await apiFetch('/api/v1/dashboard');
            if (!res) return; // apiFetch가 null 반환 시 이미 logout 처리됨
            const data = await res.json();

            document.getElementById('stat-images').textContent = data.totalImages ?? '-';
            document.getElementById('stat-objects').textContent = data.totalObjects ?? '-';
            document.getElementById('stat-buckets').textContent = data.buckets?.length ?? '-';

            const totalSize = data.buckets?.reduce((sum, b) => sum + (b.totalSize || 0), 0) || 0;
            document.getElementById('stat-size').textContent = formatBytes(totalSize);

            // 버킷 목록
            const bucketEl = document.getElementById('bucket-list');
            if (data.buckets?.length) {
                bucketEl.innerHTML = data.buckets.map(b => `
                    <div class="bucket-item">
                      <span class="bucket-name">${b.name}</span>
                      <span class="bucket-count">${b.objectCount}개 · ${formatBytes(b.totalSize)}</span>
                    </div>
                `).join('');
            } else {
                bucketEl.innerHTML = '<div class="empty">버킷이 없습니다</div>';
            }

            // 최근 이미지
            const gridEl = document.getElementById('image-grid');
            const imagesRes = await apiFetch('/api/v1/images?limit=10');
            if (!imagesRes) return;
            const imagesData = await imagesRes.json();
            const images = imagesData.images || [];

            if (images.length) {
                gridEl.innerHTML = images.map(img => {
                    const filename = img.objectKey?.split('/').pop() || '-';
                    const thumbUrl = `/api/v1/proxy/images/${img.id}/variants/thumb_xs.png`;
                    return `
                        <div class="image-card">
                          <div class="image-thumb">
                            <img src="${thumbUrl}" alt="${filename}" onerror="this.style.display='none'" />
                          </div>
                          <div class="image-info">
                            <div class="image-name" title="${filename}">${filename}</div>
                            <div class="image-size">${formatBytes(img.size)}</div>
                            <span class="badge">${img.contentType?.split('/')[1] || '-'}</span>
                          </div>
                        </div>
                    `;
                }).join('');
            } else {
                gridEl.innerHTML = '<div class="empty" style="grid-column:1/-1">이미지가 없습니다</div>';
            }

        } catch (e) {
            console.error(e);
        }
    }

    // 유저 이메일 표시 (JWT 디코딩)
    try {
        const token = localStorage.getItem('accessToken');
        const payload = JSON.parse(atob(token.split('.')[1]));
        const email = payload.email || '';
        document.getElementById('user-avatar').textContent = email.substring(0, 2).toUpperCase();
        document.getElementById('user-name').textContent = email.split('@')[0];
    } catch(e) {}

    loadDashboard();
</script>
</body>
</html>
